<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Lulu Lucas 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  position:relative;
}

.container{
  text-align:center;
  background:white;
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:400px;
  position:relative;
  box-sizing:border-box;
}

h1{
  color:#ff4d6d;
  font-size:2rem;
  margin-bottom:10px;
}

#question{
  margin:15px 0;
  font-size:1.2rem;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

#yesBtn{background:#ff4d6d;color:white;}
#noBtn{background:#6a0dad;color:white;position:fixed; z-index:50;}

#saveBtn{
  background:#ff4d6d;
  color:white;
  margin-top:10px;
  width:80%;
  max-width:250px;
}

.emoji{
  position:absolute;
  font-size:2rem;
  animation:float 2s linear forwards;
}

@keyframes float{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-150px);}
}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  text-align:center;
  color:#ff4d6d;
  font-weight:bold;
  background:rgba(255,255,255,0.95);
  padding:8px 0;
  z-index:1000;
  font-size:0.9rem;
}

.note{
  position:absolute;
  background:#fffdd0;
  color:#000;
  padding:6px 10px;
  border-radius:8px;
  font-size:0.9rem;
  opacity:0.95;
  z-index:100;
  transition:opacity 0.5s ease;
}

.signature-area{
  margin-top:20px;
  text-align:center;
}

.signature-line{
  border-bottom:2px solid #000;
  width:90%;
  max-width:350px;
  height:40px;
  margin:10px auto;
  position:relative;
}

.signature-input{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  font-size:1.2rem;
  font-family:'Poppins',sans-serif;
  outline:none;
  padding:5px;
}

canvas{
  border:1px solid #000;
  border-radius:10px;
  margin-top:10px;
  max-width:95%;
  width:350px;
  height:150px;
  touch-action:none;
  display:block;
  margin-left:auto;
  margin-right:auto;
}
</style>
</head>
<body>

<div class="container">
  <h1>Hi Lulu Lucas 💖</h1>
  <div id="question">Do you love me?</div>
  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
</div>

<footer>© 2026 All copies reserved</footer>

<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>
<audio id="yesSound" src="https://www.soundjay.com/button/button-3.mp3"></audio>

<script>
const questions = [
"Do you love me?","Will you stay with me forever?","Do you miss me?",
"Do you want to travel with me?","Will you hold my hand always?","Do you think about me?",
"Do you like my smile?","Will you laugh with me?","Do you want to build life together?",
"Will you support me?","Do you enjoy my company?","Will you be my happiness?",
"Do you want adventures together?","Will you trust me always?","Do you want endless love?",
"Will you share dreams with me?","Do you love our moments?","Will you stay loyal?",
"Do you want forever with me?","Will you marry me? 💍"
];

let index=0;
const question=document.getElementById("question");
const yesBtn=document.getElementById("yesBtn");

// YES
yesBtn.onclick=()=>{
  index++;
  if(index<questions.length){
    question.innerText=questions[index];
  }else{
    document.body.innerHTML=`
    <div style="text-align:center;padding:15px; max-width:400px; margin:auto;">
      <h2>💖 Thank you Lulu Lucas 💖</h2>
      <p>I, Lulu Lucas, agree to marry Jamal Hassan ❤️</p>
      <p>Our journey begins today, forever intertwined with love and laughter 💕</p>

      <div class="signature-area">
        <label>Type your initials on the line:</label>
        <div class="signature-line">
          <input class="signature-input" placeholder="L.L."/>
        </div>

        <label>Or draw your signature below:</label>
        <canvas id="sigCanvas"></canvas>

        <button id="saveBtn">💾 Save Signature</button>
      </div>
    </div>`;

    const canvas=document.getElementById('sigCanvas');
    canvas.width=canvas.offsetWidth;
    canvas.height=150;
    const ctx=canvas.getContext('2d');
    let drawing=false;
    const input=document.querySelector('.signature-input');

    canvas.addEventListener('mousedown',e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);});
    canvas.addEventListener('mousemove',e=>{if(drawing){ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();}});
    canvas.addEventListener('mouseup',()=>{drawing=false;ctx.beginPath();});

    canvas.addEventListener('touchstart',e=>{drawing=true;let t=e.touches[0];ctx.beginPath();ctx.moveTo(t.clientX-canvas.getBoundingClientRect().left,t.clientY-canvas.getBoundingClientRect().top);});
    canvas.addEventListener('touchmove',e=>{if(drawing){let t=e.touches[0];ctx.lineTo(t.clientX-canvas.getBoundingClientRect().left,t.clientY-canvas.getBoundingClientRect().top);ctx.stroke();}});
    canvas.addEventListener('touchend',()=>{drawing=false;ctx.beginPath();});

    input.addEventListener('input',()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.font="40px 'Poppins',sans-serif";
      ctx.fillStyle="#ff4d6d";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(input.value,canvas.width/2,canvas.height/2);
    });

    document.getElementById('saveBtn').onclick=()=>{
      const link=document.createElement('a');
      link.download='Lulu_Lucas_Signature.png';
      link.href=canvas.toDataURL();
      link.click();
    };
  }
};
</script>
</body>
</html>
